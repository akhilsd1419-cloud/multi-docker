name: Deploy MultiDocker
on:
  push:
    branches:
      - master # check your repo, your default branch might be master!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t akhilsharma1419/react-test -f ./client/Dockerfile.dev ./client
      - run: docker run -e CI=true akhilsharma1419/react-test npm test

      - run: docker build -t akhilsharma1419/multi-client ./client
      - run: docker build -t akhilsharma1419/multi-nginx ./nginx
      - run: docker build -t akhilsharma1419/multi-server ./server
      - run: docker build -t akhilsharma1419/multi-worker ./worker

      - run: docker push akhilsharma1419/multi-client
      - run: docker push akhilsharma1419/multi-nginx
      - run: docker push akhilsharma1419/multi-server
      - run: docker push akhilsharma1419/multi-worker

      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v18
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
          application_name: multi-docker
          environment_name: Multi-docker-env
          existing_bucket_name: elasticbeanstalk-us-east-1-231378335441
          region: us-east-1
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip      